# ============================================================================
# EAMS 企业资产管理系统 - 应用主配置
# ============================================================================
server:
  port: 8080
  servlet:
    context-path: /

spring:
  profiles:
    active: dev
  application:
    name: eams-backend

  # ---- 数据源 ----
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://127.0.0.1:3306/eams?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
      username: root
      password: Admin@123456
      # 连接池配置
      initial-size: 5
      min-idle: 5
      max-active: 50
      max-wait: 60000
      # 监控
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
      filter:
        stat:
          log-slow-sql: true
          slow-sql-millis: 1000

  # ---- Redis ----
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 200
        max-idle: 20
        min-idle: 5
        max-wait: 3000ms

  # ---- 文件上传 ----
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  # ---- Jackson ----
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# ---- MyBatis-Plus ----
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.eams.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ---- JWT ----
jwt:
  # 签名密钥（生产环境通过环境变量注入，≥256位随机字符串）
  secret: EamsJwtSecretKey2026ForDevEnvironmentOnly!!

# ---- DeepSeek ----
deepseek:
  api:
    key: ${DEEPSEEK_API_KEY:sk-your-deepseek-api-key-here}

# ---- 文件存储 ----
eams:
  upload:
    path: D:/Projects/eams-project/eams-backend/upload
---
# ============================================================================
# 开发环境
# ============================================================================
spring:
  profiles: dev
  datasource:
    druid:
      url: jdbc:mysql://127.0.0.1:3306/eams?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: root

---
# ============================================================================
# 生产环境
# ============================================================================
spring:
  profiles: prod
  datasource:
    druid:
      url: jdbc:mysql://127.0.0.1:3306/eams?useUnicode=true&characterEncoding=UTF-8&useSSL=true&serverTimezone=Asia/Shanghai
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
  redis:
    host: ${REDIS_HOST:localhost}
    password: ${REDIS_PASSWORD}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

jwt:
  secret: ${JWT_SECRET}

deepseek:
  api:
    key: ${DEEPSEEK_API_KEY}

logging:
  file:
    path: ./logs
    name: ./logs/eams-backend.log

